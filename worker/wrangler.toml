name = "wc2026-push"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Poll ESPN every minute. Widen (e.g. "*/2 * * * *") to poll less often.
[triggers]
crons = ["* * * * *"]

# Create these two KV namespaces and paste their ids (see README step 3).
[[kv_namespaces]]
binding = "SUBS"
id = "REPLACE_WITH_SUBS_KV_ID"

[[kv_namespaces]]
binding = "STATE"
id = "REPLACE_WITH_STATE_KV_ID"

[vars]
ALLOWED_ORIGIN = "https://contractken.github.io"
SITE_URL = "https://contractken.github.io/wc2026/"
VAPID_SUBJECT = "mailto:amit@contractken.com"
# Paste the PUBLIC VAPID key here (same one you put in src/config.ts).
VAPID_PUBLIC_KEY = "REPLACE_WITH_VAPID_PUBLIC_KEY"
# VAPID_PRIVATE_KEY is set as a secret, NOT here: `wrangler secret put VAPID_PRIVATE_KEY`
