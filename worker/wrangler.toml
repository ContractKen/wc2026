name = "wc2026-push"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Poll ESPN every minute. Widen (e.g. "*/2 * * * *") to poll less often.
[triggers]
crons = ["* * * * *"]

# Create these two KV namespaces and paste their ids (see README step 3).
[[kv_namespaces]]
binding = "SUBS"
id = "52ca9d6fad574bb588b66a28f882d483"

[[kv_namespaces]]
binding = "STATE"
id = "2dbb638033084e309d44184bdb2685ee"

[vars]
# "*" so subscribe works from any origin (both the pages.dev and github.io builds).
ALLOWED_ORIGIN = "*"
SITE_URL = "https://worldcup26app.pages.dev/"
VAPID_SUBJECT = "mailto:amit@contractken.com"
# Paste the PUBLIC VAPID key here (same one you put in src/config.ts).
VAPID_PUBLIC_KEY = "BL3128TW_NrZvU98hA8LVIYH3dzgyJrx6Rn6wJeeDwacv7FYm28FZfvKrk1CBDXk7Tsyv7CtL_2s5AHGeRo_fuY"
# VAPID_PRIVATE_KEY is set as a secret, NOT here: `wrangler secret put VAPID_PRIVATE_KEY`
